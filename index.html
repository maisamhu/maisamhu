<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vault · Private Channel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080b10;
    --surface:   #0e1219;
    --surface2:  #141922;
    --border:    rgba(255,255,255,0.06);
    --accent:    #00e5a0;
    --accent2:   #00b8ff;
    --danger:    #ff4569;
    --text:      #e8edf5;
    --muted:     #4a5568;
    --out-bg:    rgba(0,229,160,0.12);
    --in-bg:     rgba(0,184,255,0.08);
    --out-border: rgba(0,229,160,0.25);
    --in-border:  rgba(0,184,255,0.2);
    --radius:    14px;
    --font-main: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    overflow: hidden;
  }

  /* ─── Noise texture overlay ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9998; opacity: .45;
  }

  /* ─── Auth Screen ─── */
  #auth-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    background: var(--bg);
    z-index: 100;
    transition: opacity .5s ease, transform .5s ease;
  }
  #auth-screen.hide {
    opacity: 0; transform: scale(1.04) translateY(-16px);
    pointer-events: none;
  }

  .auth-logo {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .auth-logo .lock-icon {
    width: 52px; height: 52px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 28px rgba(0,229,160,0.2), inset 0 0 20px rgba(0,229,160,0.04);
    animation: pulse-ring 3s infinite;
  }
  .auth-logo .lock-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  .auth-logo h1 { font-size: 1.1rem; letter-spacing: .35em; text-transform: uppercase; color: var(--muted); font-weight: 500; }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    width: min(380px, 92vw);
    display: flex; flex-direction: column; gap: 20px;
    box-shadow: 0 32px 80px rgba(0,0,0,.5);
  }
  .auth-card p {
    font-family: var(--font-mono); font-size: .72rem;
    color: var(--muted); letter-spacing: .08em; text-align: center;
  }

  .input-wrap {
    position: relative;
  }
  .input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 48px 14px 16px;
    font-family: var(--font-mono); font-size: .95rem;
    color: var(--text); outline: none;
    letter-spacing: .12em;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-wrap input::placeholder { color: var(--muted); letter-spacing: .06em; }
  .input-wrap input:focus {
    border-color: rgba(0,229,160,.4);
    box-shadow: 0 0 0 3px rgba(0,229,160,.08);
  }
  .input-wrap .eye-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted);
    padding: 4px; display: flex; align-items: center;
    transition: color .2s;
  }
  .input-wrap .eye-btn:hover { color: var(--accent); }
  .input-wrap .eye-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }

  .auth-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none; border-radius: 10px;
    font-family: var(--font-main); font-size: .9rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 24px rgba(0,229,160,.2);
  }
  .auth-btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,229,160,.3); }
  .auth-btn:active { transform: translateY(0); }

  .auth-error {
    font-family: var(--font-mono); font-size: .72rem;
    color: var(--danger); text-align: center; letter-spacing: .06em;
    opacity: 0; transition: opacity .3s;
    min-height: 16px;
  }
  .auth-error.show { opacity: 1; }

  /* ─── App Shell ─── */
  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity .5s ease .2s;
  }
  #app.visible { opacity: 1; pointer-events: all; }

  /* ─── Privacy Overlay ─── */
  #privacy-veil {
    position: fixed; inset: 0; z-index: 500;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  #privacy-veil.active { opacity: 1; pointer-events: all; }
  #privacy-veil .veil-icon { width: 56px; height: 56px; stroke: var(--muted); fill: none; stroke-width: 1.5; }
  #privacy-veil p { color: var(--muted); font-family: var(--font-mono); font-size: .72rem; letter-spacing: .1em; }

  /* ─── Header ─── */
  #chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem; font-weight: 700; color: #000;
    flex-shrink: 0;
  }
  .header-info h2 { font-size: 1rem; font-weight: 600; letter-spacing: .02em; }
  .header-info .status {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: .65rem; color: var(--accent); letter-spacing: .06em;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: blink 2.5s infinite;
  }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .hdr-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px;
    font-family: var(--font-mono); font-size: .65rem;
    color: var(--muted); cursor: pointer; letter-spacing: .06em;
    transition: all .2s; white-space: nowrap;
  }
  .hdr-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }
  .hdr-btn:hover { border-color: rgba(255,255,255,.15); color: var(--text); }

  .hdr-btn.privacy-btn:hover { border-color: rgba(0,184,255,.4); color: var(--accent2); }
  .hdr-btn.safe-btn { color: var(--danger); border-color: rgba(255,69,105,.2); }
  .hdr-btn.safe-btn:hover { background: rgba(255,69,105,.08); border-color: rgba(255,69,105,.4); color: var(--danger); }
  .hdr-btn.safe-btn.active { background: rgba(255,69,105,.15); border-color: rgba(255,69,105,.5); animation: throb .8s infinite alternate; }

  /* ─── Safe Mode Banner ─── */
  #safe-banner {
    display: none;
    align-items: center; justify-content: center; gap: 10px;
    padding: 9px 20px;
    background: rgba(255,69,105,.1);
    border-bottom: 1px solid rgba(255,69,105,.2);
    font-family: var(--font-mono); font-size: .7rem;
    color: var(--danger); letter-spacing: .08em;
  }
  #safe-banner.show { display: flex; }
  #safe-banner svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; animation: spin 4s linear infinite; }
  #countdown { font-weight: 500; }

  /* ─── Messages Area ─── */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 24px 16px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .day-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 12px 0; color: var(--muted);
    font-family: var(--font-mono); font-size: .62rem; letter-spacing: .1em;
  }
  .day-divider::before, .day-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .msg-row {
    display: flex;
    animation: msgIn .25s ease forwards;
    opacity: 0;
  }
  .msg-row.out { justify-content: flex-end; }
  .msg-row.in  { justify-content: flex-start; }

  .bubble {
    max-width: min(68%, 340px);
    padding: 10px 14px;
    border-radius: var(--radius);
    position: relative;
    line-height: 1.55;
    font-size: .88rem;
  }
  .msg-row.out .bubble {
    background: var(--out-bg);
    border: 1px solid var(--out-border);
    border-bottom-right-radius: 4px;
  }
  .msg-row.in .bubble {
    background: var(--in-bg);
    border: 1px solid var(--in-border);
    border-bottom-left-radius: 4px;
  }
  .bubble .sender-name {
    font-family: var(--font-mono); font-size: .6rem; font-weight: 500;
    letter-spacing: .08em; margin-bottom: 4px;
    display: block;
  }
  .msg-row.out .bubble .sender-name { color: var(--accent); }
  .msg-row.in  .bubble .sender-name { color: var(--accent2); }
  .bubble .msg-text { word-break: break-word; }
  .bubble .msg-time {
    font-family: var(--font-mono); font-size: .6rem;
    color: var(--muted); margin-top: 5px;
    display: block; text-align: right;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: var(--muted);
  }
  .empty-state svg { width: 40px; height: 40px; stroke: currentColor; fill: none; stroke-width: 1.2; opacity: .4; }
  .empty-state p { font-family: var(--font-mono); font-size: .7rem; letter-spacing: .1em; opacity: .5; }

  /* ─── Input Bar ─── */
  #input-bar {
    display: flex; align-items: flex-end; gap: 10px;
    padding: 14px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: var(--font-main); font-size: .88rem;
    color: var(--text); outline: none; resize: none;
    min-height: 46px; max-height: 120px;
    line-height: 1.5;
    transition: border-color .2s, box-shadow .2s;
  }
  #msg-input::placeholder { color: var(--muted); }
  #msg-input:focus {
    border-color: rgba(0,229,160,.35);
    box-shadow: 0 0 0 3px rgba(0,229,160,.06);
  }
  #send-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: var(--accent);
    border: none; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(0,229,160,.25);
  }
  #send-btn svg { width: 18px; height: 18px; stroke: #000; fill: none; stroke-width: 2.2; }
  #send-btn:hover { opacity: .9; transform: scale(1.05); }
  #send-btn:active { transform: scale(.96); }
  #send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  /* ─── Logged-in badge ─── */
  #user-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: .62rem;
    color: var(--muted); padding: 0 16px 4px;
    letter-spacing: .06em;
  }
  #user-badge span { color: var(--accent); font-weight: 500; }

  /* ─── Keyframes ─── */
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 18px rgba(0,229,160,.15), inset 0 0 16px rgba(0,229,160,.04); }
    50%       { box-shadow: 0 0 34px rgba(0,229,160,.3),  inset 0 0 24px rgba(0,229,160,.08); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes throb {
    from { box-shadow: 0 0 0 0 rgba(255,69,105,.0); }
    to   { box-shadow: 0 0 14px 2px rgba(255,69,105,.3); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ─── Responsive tweaks ─── */
  @media (max-width: 480px) {
    .auth-card { padding: 28px 22px; }
    .hdr-btn .btn-label { display: none; }
    .hdr-btn { padding: 8px; }
  }
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-logo">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Vault</h1>
  </div>

  <div class="auth-card">
    <p>ENTER YOUR SECRET CODE TO ACCESS THE CHANNEL</p>
    <div class="input-wrap">
      <input type="password" id="code-input" placeholder="Secret code…" autocomplete="off" />
      <button class="eye-btn" id="toggle-eye" aria-label="Show/hide code">
        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="auth-btn" id="auth-btn">Unlock Channel</button>
    <div class="auth-error" id="auth-error">⊘ Access Denied — invalid code</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- Privacy Veil -->
  <div id="privacy-veil">
    <svg class="veil-icon" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    <p>TAP ANYWHERE TO REVEAL</p>
  </div>

  <!-- Header -->
  <div id="chat-header">
    <div class="header-left">
      <div class="avatar" id="room-avatar">S</div>
      <div class="header-info">
        <h2>Sam</h2>
        <div class="status"><div class="status-dot"></div><span id="conn-status">ENCRYPTED · E2E</span></div>
      </div>
    </div>
    <div class="header-right">
      <button class="hdr-btn privacy-btn" id="privacy-btn" title="Privacy overlay">
        <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <span class="btn-label">HIDE</span>
      </button>
      <button class="hdr-btn safe-btn" id="safe-btn" title="Safe mode – deletes chat in 5 mins">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="btn-label">SAFE MODE</span>
      </button>
    </div>
  </div>

  <!-- Safe Mode Banner -->
  <div id="safe-banner">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    SAFE MODE ACTIVE · DELETING IN <span id="countdown">5:00</span>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>END-TO-END ENCRYPTED · NO MESSAGES YET</p>
    </div>
  </div>

  <!-- User badge -->
  <div id="user-badge">SENDING AS <span id="badge-name">—</span></div>

  <!-- Input bar -->
  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Type a message…" maxlength="2000"></textarea>
    <button id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── Firebase config ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyA7vzVt4iYPiUHTc5Jhs_fapu4ylsMNKb8",
  authDomain:        "news-eb672.firebaseapp.com",
  databaseURL:       "https://news-eb672-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "news-eb672",
  storageBucket:     "news-eb672.firebasestorage.app",
  messagingSenderId: "812948185160",
  appId:             "1:812948185160:web:8ccda64220f330d4fdf87d"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const ROOM_REF = ref(db, "rooms/sam-channel");

// ─── State ─────────────────────────────────────────────────────────
let currentUser   = null;  // "Jiya" | "Sam"
let safeTimer     = null;
let safeInterval  = null;
let safeSecondsLeft = 300;
let privacyOn     = false;
let knownKeys     = new Set();

// ─── DOM refs ──────────────────────────────────────────────────────
const authScreen  = document.getElementById("auth-screen");
const appEl       = document.getElementById("app");
const codeInput   = document.getElementById("code-input");
const authBtn     = document.getElementById("auth-btn");
const authError   = document.getElementById("auth-error");
const toggleEye   = document.getElementById("toggle-eye");
const eyeIcon     = document.getElementById("eye-icon");

const messagesEl  = document.getElementById("messages");
const emptyState  = document.getElementById("empty-state");
const msgInput    = document.getElementById("msg-input");
const sendBtn     = document.getElementById("send-btn");
const badgeName   = document.getElementById("badge-name");

const privacyBtn  = document.getElementById("privacy-btn");
const privacyVeil = document.getElementById("privacy-veil");
const safeBtn     = document.getElementById("safe-btn");
const safeBanner  = document.getElementById("safe-banner");
const countdownEl = document.getElementById("countdown");
const connStatus  = document.getElementById("conn-status");

// ─── Auth logic ────────────────────────────────────────────────────
const VALID_CODES = { jiya: "Jiya", sam: "Sam" };

function attemptLogin() {
  const val = codeInput.value.trim().toLowerCase();
  if (VALID_CODES[val]) {
    currentUser = VALID_CODES[val];
    authError.classList.remove("show");
    authScreen.classList.add("hide");
    appEl.classList.add("visible");
    badgeName.textContent = currentUser.toUpperCase();
    startListening();
    msgInput.focus();
  } else {
    authError.classList.add("show");
    codeInput.value = "";
    codeInput.focus();
    setTimeout(() => authError.classList.remove("show"), 3000);
  }
}

authBtn.addEventListener("click", attemptLogin);
codeInput.addEventListener("keydown", e => { if (e.key === "Enter") attemptLogin(); });

// Eye toggle
toggleEye.addEventListener("click", () => {
  const showing = codeInput.type === "text";
  codeInput.type = showing ? "password" : "text";
  eyeIcon.innerHTML = showing
    ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
    : `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
});

// ─── Realtime listener ─────────────────────────────────────────────
let unsubscribe = null;

function startListening() {
  connStatus.textContent = "CONNECTING…";
  unsubscribe = onValue(ROOM_REF, (snapshot) => {
    connStatus.textContent = "ENCRYPTED · E2E";
    const data = snapshot.val();

    // Figure out which keys are new
    const currentKeys = data ? Object.keys(data) : [];
    const newKeys = currentKeys.filter(k => !knownKeys.has(k));

    // First render: render all
    if (knownKeys.size === 0 && currentKeys.length > 0) {
      messagesEl.innerHTML = "";
      emptyState && emptyState.remove();
      currentKeys.sort((a,b) => (data[a].ts||0) - (data[b].ts||0)).forEach(k => {
        renderBubble(k, data[k]);
        knownKeys.add(k);
      });
    } else {
      // Incremental: only add truly new messages
      newKeys.sort((a,b) => (data[a].ts||0) - (data[b].ts||0)).forEach(k => {
        maybeRemoveEmpty();
        renderBubble(k, data[k]);
        knownKeys.add(k);
      });
    }

    // If all messages deleted remotely
    if (!data || currentKeys.length === 0) {
      messagesEl.innerHTML = "";
      knownKeys.clear();
      renderEmptyState();
    }

    scrollToBottom();
  }, (err) => {
    connStatus.textContent = "⚠ CONNECTION ERROR";
    console.error(err);
  });
}

// ─── Render helpers ────────────────────────────────────────────────
function maybeRemoveEmpty() {
  const empty = document.getElementById("empty-state");
  if (empty) empty.remove();
}

function renderEmptyState() {
  if (!document.getElementById("empty-state")) {
    const div = document.createElement("div");
    div.className = "empty-state"; div.id = "empty-state";
    div.innerHTML = `<svg viewBox="0 0 24 24" style="width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.2;opacity:.4"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>END-TO-END ENCRYPTED · NO MESSAGES YET</p>`;
    messagesEl.appendChild(div);
  }
}

function renderBubble(key, msgData) {
  const dir = msgData.sender === currentUser ? "out" : "in";
  const row = document.createElement("div");
  row.className = `msg-row ${dir}`;
  row.dataset.key = key;

  const time = msgData.ts
    ? new Date(msgData.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : "";

  row.innerHTML = `
    <div class="bubble">
      <span class="sender-name">${escHtml(msgData.sender)}</span>
      <div class="msg-text">${escHtml(msgData.text)}</div>
      <span class="msg-time">${time}</span>
    </div>`;
  messagesEl.appendChild(row);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ─── Send message ──────────────────────────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !currentUser) return;
  sendBtn.disabled = true;
  msgInput.value = "";
  autoResize();
  try {
    await push(ROOM_REF, {
      sender: currentUser,
      text,
      ts: Date.now()
    });
  } catch (e) {
    console.error("Send failed:", e);
    // Restore text on failure
    msgInput.value = text;
  }
  sendBtn.disabled = false;
  msgInput.focus();
}

sendBtn.addEventListener("click", sendMessage);
msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
function autoResize() {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
}
msgInput.addEventListener("input", autoResize);

// ─── Privacy Overlay ───────────────────────────────────────────────
privacyBtn.addEventListener("click", () => {
  privacyOn = true;
  privacyVeil.classList.add("active");
});
privacyVeil.addEventListener("click", () => {
  privacyOn = false;
  privacyVeil.classList.remove("active");
});

// ─── Safe Mode ─────────────────────────────────────────────────────
safeBtn.addEventListener("click", () => {
  if (safeTimer) {
    // Cancel safe mode
    clearTimeout(safeTimer);
    clearInterval(safeInterval);
    safeTimer = null;
    safeBtn.classList.remove("active");
    safeBanner.classList.remove("show");
    safeSecondsLeft = 300;
    return;
  }
  activateSafeMode();
});

function activateSafeMode() {
  safeSecondsLeft = 300;
  safeBtn.classList.add("active");
  safeBanner.classList.add("show");
  updateCountdown();

  safeInterval = setInterval(() => {
    safeSecondsLeft--;
    updateCountdown();
    if (safeSecondsLeft <= 0) {
      clearInterval(safeInterval);
    }
  }, 1000);

  safeTimer = setTimeout(() => {
    nukeChat();
  }, 300_000);
}

function updateCountdown() {
  const m = Math.floor(safeSecondsLeft / 60);
  const s = safeSecondsLeft % 60;
  countdownEl.textContent = `${m}:${String(s).padStart(2,"0")}`;
}

async function nukeChat() {
  // Delete all messages from Firebase
  try { await remove(ROOM_REF); } catch(e) { console.error(e); }
  knownKeys.clear();
  messagesEl.innerHTML = "";
  renderEmptyState();
  safeBtn.classList.remove("active");
  safeBanner.classList.remove("show");
  safeTimer = null;
  safeSecondsLeft = 300;
}
</script>
</body>
