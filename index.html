<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM — Encrypted</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #080b10;
    --surface:  #0d1117;
    --glass:    rgba(255,255,255,0.03);
    --border:   rgba(255,255,255,0.07);
    --accent:   #00e5a0;
    --accent2:  #0af;
    --danger:   #ff4466;
    --text:     #e8eaf0;
    --muted:    #4a5068;
    --out-bg:   rgba(0,229,160,0.10);
    --in-bg:    rgba(255,255,255,0.05);
    --radius:   18px;
    --font-ui:  'Syne', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }

  /* ══════════════════════════════════════
     AUTH SCREEN
  ══════════════════════════════════════ */
  #auth-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    background: var(--bg);
    z-index: 100;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #auth-screen.hiding {
    opacity: 0; transform: scale(0.96) translateY(-12px);
    pointer-events: none;
  }
  #auth-screen.hidden { display: none; }

  .auth-logo {
    font-size: 11px; font-weight: 600; letter-spacing: 0.35em;
    color: var(--muted); text-transform: uppercase;
    font-family: var(--font-mono);
  }

  .auth-title {
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text) 30%, var(--muted));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .auth-sub {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--muted); letter-spacing: 0.08em;
  }

  .auth-box {
    display: flex; flex-direction: column; gap: 14px;
    width: min(340px, 90vw);
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }

  .auth-label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase;
  }

  #secret-input {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: var(--font-mono); font-size: 20px;
    letter-spacing: 0.3em; color: var(--accent);
    outline: none; width: 100%;
    transition: border-color 0.2s;
    text-align: center;
  }
  #secret-input:focus { border-color: var(--accent); }
  #secret-input.error { border-color: var(--danger); animation: shake 0.4s ease; }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }

  #auth-btn {
    padding: 14px;
    background: var(--accent); color: #000;
    font-family: var(--font-ui); font-weight: 700;
    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
    border: none; border-radius: 10px; cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  #auth-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  #auth-btn:active { transform: translateY(0); }

  #auth-error {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--danger); text-align: center; min-height: 16px;
    letter-spacing: 0.05em;
  }

  /* ══════════════════════════════════════
     CHAT SCREEN
  ══════════════════════════════════════ */
  #chat-screen {
    display: none; flex-direction: column;
    height: 100dvh; position: relative;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
  }
  #chat-screen.visible {
    display: flex; opacity: 1; transform: none;
  }

  /* HEADER */
  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
    flex-shrink: 0;
  }

  .header-identity {
    display: flex; align-items: center; gap: 12px;
  }

  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: #000;
    flex-shrink: 0;
  }

  .header-name {
    font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
  }
  .header-status {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--accent); letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 5px;
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1} 50%{opacity:0.3}
  }

  .header-actions {
    display: flex; gap: 8px;
  }

  .hbtn {
    padding: 7px 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--glass);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; color: var(--text);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .hbtn:hover { border-color: var(--accent); color: var(--accent); }
  .hbtn.active { background: rgba(255,68,102,0.12); border-color: var(--danger); color: var(--danger); }
  .hbtn.blurred-active { background: rgba(0,170,255,0.12); border-color: var(--accent2); color: var(--accent2); }

  /* SAFE MODE BAR */
  #safe-bar {
    display: none;
    background: linear-gradient(90deg, rgba(255,68,102,0.08), rgba(255,68,102,0.03));
    border-bottom: 1px solid rgba(255,68,102,0.2);
    padding: 8px 20px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--danger); letter-spacing: 0.08em;
    align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  #safe-bar.show { display: flex; }
  #safe-bar .bar-icon { font-size: 14px; }
  #safe-countdown { font-weight: 500; }

  /* MY IDENTITY TAG */
  #identity-bar {
    padding: 7px 20px;
    background: rgba(0,229,160,0.04);
    border-bottom: 1px solid rgba(0,229,160,0.08);
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted); letter-spacing: 0.1em;
    flex-shrink: 0;
  }
  #identity-bar span { color: var(--accent); }

  /* MESSAGES */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    opacity: 0; transform: translateY(8px);
    animation: msgIn 0.3s ease forwards;
  }
  @keyframes msgIn {
    to { opacity:1; transform:none; }
  }
  .msg-row.out { justify-content: flex-end; }
  .msg-row.in  { justify-content: flex-start; }

  .msg-bubble {
    max-width: min(72%, 440px);
    padding: 11px 16px 9px;
    border-radius: 16px;
    position: relative;
  }
  .msg-row.out .msg-bubble {
    background: var(--out-bg);
    border: 1px solid rgba(0,229,160,0.15);
    border-bottom-right-radius: 4px;
  }
  .msg-row.in .msg-bubble {
    background: var(--in-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-sender {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 4px; font-weight: 500;
  }
  .msg-row.out .msg-sender { color: var(--accent); text-align: right; }
  .msg-row.in  .msg-sender { color: var(--accent2); }

  .msg-text {
    font-size: 14px; line-height: 1.55;
    word-break: break-word;
  }

  .msg-time {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--muted); margin-top: 4px;
    text-align: right;
  }

  /* Date separator */
  .date-sep {
    text-align: center;
    font-family: var(--font-mono); font-size: 9px;
    color: var(--muted); letter-spacing: 0.15em;
    padding: 8px 0; text-transform: uppercase;
  }

  /* Typing indicator */
  #typing-indicator {
    padding: 0 20px 8px;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted); min-height: 22px;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .typing-dots span {
    display: inline-block;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--muted); margin: 0 1.5px;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:0.2s}
  .typing-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  /* INPUT */
  .chat-footer {
    padding: 12px 16px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: var(--font-ui); font-size: 14px;
    color: var(--text); outline: none; resize: none;
    max-height: 120px; line-height: 1.4;
    transition: border-color 0.2s;
  }
  #msg-input::placeholder { color: var(--muted); }
  #msg-input:focus { border-color: rgba(0,229,160,0.3); }

  #send-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--accent); color: #000;
    border: none; border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    font-size: 18px;
  }
  #send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── PRIVACY OVERLAY ── */
  #privacy-overlay {
    position: fixed; inset: 0; z-index: 500;
    backdrop-filter: blur(28px) brightness(0.3);
    -webkit-backdrop-filter: blur(28px) brightness(0.3);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    cursor: pointer;
  }
  #privacy-overlay.show { display: flex; }
  .overlay-icon { font-size: 48px; opacity: 0.6; }
  .overlay-text {
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.2em; color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  /* ── SYSTEM MESSAGES ── */
  .sys-msg {
    text-align: center;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted); padding: 4px 0;
    letter-spacing: 0.06em;
  }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; flex: 1; pointer-events: none;
  }
  .empty-icon { font-size: 36px; opacity: 0.15; }
  .empty-text {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--muted); letter-spacing: 0.1em;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 100px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
    opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 200;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MOBILE tweaks */
  @media (max-width: 480px) {
    .hbtn { padding: 6px 9px; font-size: 9px; }
    .header-name { font-size: 15px; }
    .msg-bubble { max-width: 85%; }
  }

  /* LOADING spinner inside messages */
  .loading-msg {
    display: flex; align-items: center; justify-content: center;
    padding: 24px 0;
    font-family: var(--font-mono); font-size: 11px; color: var(--muted);
    gap: 10px;
  }
  .spin {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ════════════════════════════════
     AUTH SCREEN
════════════════════════════════ -->
<div id="auth-screen">
  <div style="text-align:center">
    <div class="auth-logo">End-to-End Encrypted</div>
    <h1 class="auth-title" style="margin-top:10px">SAM</h1>
    <p class="auth-sub" style="margin-top:8px">Private · Encrypted · Ephemeral</p>
  </div>

  <div class="auth-box">
    <label class="auth-label" for="secret-input">Secret Code</label>
    <input type="password" id="secret-input" placeholder="••••" maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="auth-btn">Unlock</button>
    <div id="auth-error"></div>
  </div>

  <p style="font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.08em">
    No servers. No logs. Device only.
  </p>
</div>

<!-- ════════════════════════════════
     CHAT SCREEN
════════════════════════════════ -->
<div id="chat-screen">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-identity">
      <div class="avatar" id="other-avatar">S</div>
      <div>
        <div class="header-name" id="chat-title">SAM</div>
        <div class="header-status"><span class="status-dot"></span><span id="conn-label">connecting…</span></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="hbtn" id="privacy-btn" title="Privacy blur">👁 Blur</button>
      <button class="hbtn" id="safe-btn" title="Safe mode">🛡 Safe</button>
    </div>
  </div>

  <!-- Safe-mode countdown bar -->
  <div id="safe-bar">
    <span class="bar-icon">🔴</span>
    <span>SAFE MODE ACTIVE — Deleting in </span>
    <span id="safe-countdown">5:00</span>
    <span> — click Safe again to cancel</span>
  </div>

  <!-- Identity bar -->
  <div id="identity-bar">Signed in as <span id="my-name-label">—</span></div>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <div class="empty-icon">🔒</div>
      <div class="empty-text">Messages are encrypted on this device</div>
    </div>
  </div>

  <!-- Typing -->
  <div id="typing-indicator"></div>

  <!-- Input -->
  <div class="chat-footer">
    <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
    <button id="send-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- Privacy Overlay -->
<div id="privacy-overlay">
  <div class="overlay-icon">🔒</div>
  <div class="overlay-text">Tap to reveal</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ════════════════════════════════
     FIREBASE SDK
════════════════════════════════ -->
<script type="module">
// ────────────────────────────────────────────────────────────
//  FIREBASE CONFIG
//  ⚠️  Replace the values below with your own Firebase project.
//      Steps:
//      1. Go to https://console.firebase.google.com
//      2. Create a project (free Spark plan is enough)
//      3. Add a Web App, copy the firebaseConfig object
//      4. Go to Firestore Database → Create database (test mode)
//      5. Paste your config values here
// ────────────────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query,
  orderBy, onSnapshot, deleteDoc, getDocs,
  serverTimestamp, doc, setDoc, getDoc, onSnapshot as onDocSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDe67o6kr7rQYL_5wXrwwATF00QewYP1qU",
  authDomain:        "monograph-80f8b.firebaseapp.com",
  projectId:         "monograph-80f8b",
  storageBucket:     "monograph-80f8b.firebasestorage.app",
  messagingSenderId: "650199774235",
  appId:             "1:650199774235:web:0ba1a38f08d37d57d974be"};

// ────────────────────────────────────────────────────────────
//  APP STATE
// ────────────────────────────────────────────────────────────
const VALID_CODES = { jiya: 'Jiya', sam: 'Sam' };
const ROOM_ID      = 'sam-jiya-private';
const TYPING_TIMEOUT = 2500;

let currentUser   = null;   // 'Jiya' | 'Sam'
let db            = null;
let unsubMessages = null;
let safeTimer     = null;
let safeInterval  = null;
let safeEnd       = null;
let typingTimeout = null;
let lastDate      = null;

// ────────────────────────────────────────────────────────────
//  DOM REFS
// ────────────────────────────────────────────────────────────
const authScreen    = document.getElementById('auth-screen');
const chatScreen    = document.getElementById('chat-screen');
const secretInput   = document.getElementById('secret-input');
const authBtn       = document.getElementById('auth-btn');
const authError     = document.getElementById('auth-error');
const messagesDiv   = document.getElementById('messages');
const msgInput      = document.getElementById('msg-input');
const sendBtn       = document.getElementById('send-btn');
const privacyBtn    = document.getElementById('privacy-btn');
const safeBtn       = document.getElementById('safe-btn');
const safeBar       = document.getElementById('safe-bar');
const safeCountdown = document.getElementById('safe-countdown');
const privacyOverlay= document.getElementById('privacy-overlay');
const emptyState    = document.getElementById('empty-state');
const myNameLabel   = document.getElementById('my-name-label');
const connLabel     = document.getElementById('conn-label');
const typingEl      = document.getElementById('typing-indicator');
const toast         = document.getElementById('toast');
const otherAvatar   = document.getElementById('other-avatar');
const chatTitle     = document.getElementById('chat-title');

// ────────────────────────────────────────────────────────────
//  AUTH FLOW
// ────────────────────────────────────────────────────────────
function tryUnlock() {
  const code = secretInput.value.trim().toLowerCase();
  if (VALID_CODES[code]) {
    currentUser = VALID_CODES[code];
    authError.textContent = '';
    authScreen.classList.add('hiding');
    setTimeout(() => {
      authScreen.classList.add('hidden');
      initChat();
    }, 600);
  } else {
    authError.textContent = '⚠ Access denied';
    secretInput.classList.add('error');
    setTimeout(() => secretInput.classList.remove('error'), 700);
  }
}

authBtn.addEventListener('click', tryUnlock);
secretInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// ────────────────────────────────────────────────────────────
//  INIT CHAT
// ────────────────────────────────────────────────────────────
function initChat() {
  // Update UI for current user
  const other = currentUser === 'Jiya' ? 'Sam' : 'Jiya';
  myNameLabel.textContent = currentUser;
  chatTitle.textContent   = other.toUpperCase();
  otherAvatar.textContent = other[0];

  // Show chat
  chatScreen.style.display = 'flex';
  requestAnimationFrame(() => chatScreen.classList.add('visible'));

  // Init Firebase
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    connLabel.textContent = 'end-to-end encrypted';
    subscribeMessages();
    watchTyping(other);
  } catch(e) {
    connLabel.textContent = 'offline (demo mode)';
    showToast('Firebase not configured — running in local demo mode');
    loadLocalMessages();
  }
}

// ────────────────────────────────────────────────────────────
//  FIRESTORE: MESSAGES
// ────────────────────────────────────────────────────────────
function subscribeMessages() {
  const q = query(
    collection(db, 'rooms', ROOM_ID, 'messages'),
    orderBy('ts', 'asc')
  );

  // Show loading
  messagesDiv.innerHTML = '<div class="loading-msg"><div class="spin"></div> Loading…</div>';

  unsubMessages = onSnapshot(q, snap => {
    messagesDiv.innerHTML = '';
    lastDate = null;
    if (snap.empty) {
      messagesDiv.appendChild(buildEmptyState());
      return;
    }
    snap.forEach(docSnap => renderMessage(docSnap.data()));
    scrollBottom();
  }, err => {
    console.warn('Firestore error:', err);
    connLabel.textContent = 'offline (demo mode)';
    loadLocalMessages();
  });
}

function renderMessage(data) {
  const { sender, text, ts } = data;
  const date = ts?.toDate ? ts.toDate() : new Date(ts || Date.now());

  // Date separator
  const dateStr = date.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  if (dateStr !== lastDate) {
    lastDate = dateStr;
    const sep = document.createElement('div');
    sep.className = 'date-sep'; sep.textContent = dateStr;
    messagesDiv.appendChild(sep);
  }

  const isOut = sender === currentUser;
  const row = document.createElement('div');
  row.className = `msg-row ${isOut ? 'out' : 'in'}`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  const senderEl = document.createElement('div');
  senderEl.className = 'msg-sender';
  senderEl.textContent = sender;

  const textEl = document.createElement('div');
  textEl.className = 'msg-text';
  textEl.textContent = text;

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = date.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

  bubble.append(senderEl, textEl, timeEl);
  row.appendChild(bubble);
  messagesDiv.appendChild(row);
}

function buildEmptyState() {
  const d = document.createElement('div');
  d.id = 'empty-state';
  d.innerHTML = `<div class="empty-icon">🔒</div><div class="empty-text">Messages are encrypted on this device</div>`;
  return d;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  resizeTextarea();
  clearTypingSignal();

  const msgData = { sender: currentUser, text, ts: serverTimestamp() };

  if (db) {
    try {
      await addDoc(collection(db, 'rooms', ROOM_ID, 'messages'), msgData);
    } catch(e) {
      console.error(e);
      showToast('Failed to send');
    }
  } else {
    // Local fallback
    const local = JSON.parse(localStorage.getItem('sam_msgs') || '[]');
    local.push({ sender: currentUser, text, ts: Date.now() });
    localStorage.setItem('sam_msgs', JSON.stringify(local));
    loadLocalMessages();
  }
}

// ────────────────────────────────────────────────────────────
//  LOCAL FALLBACK (no Firebase)
// ────────────────────────────────────────────────────────────
function loadLocalMessages() {
  const msgs = JSON.parse(localStorage.getItem('sam_msgs') || '[]');
  messagesDiv.innerHTML = '';
  lastDate = null;
  if (!msgs.length) { messagesDiv.appendChild(buildEmptyState()); return; }
  msgs.forEach(m => renderMessage(m));
  scrollBottom();
}

// ────────────────────────────────────────────────────────────
//  TYPING INDICATOR
// ────────────────────────────────────────────────────────────
async function setTypingSignal(isTyping) {
  if (!db) return;
  try {
    await setDoc(doc(db, 'rooms', ROOM_ID, 'typing', currentUser), { active: isTyping });
  } catch(e) {}
}

function clearTypingSignal() {
  clearTimeout(typingTimeout);
  setTypingSignal(false);
}

function watchTyping(other) {
  if (!db) return;
  onDocSnapshot(doc(db, 'rooms', ROOM_ID, 'typing', other), snap => {
    if (snap.exists() && snap.data().active) {
      typingEl.innerHTML = `<span style="color:var(--accent2);font-size:10px;letter-spacing:0.06em">${other}</span>&nbsp;<span class="typing-dots"><span></span><span></span><span></span></span>`;
    } else {
      typingEl.innerHTML = '';
    }
  }, () => {});
}

// ────────────────────────────────────────────────────────────
//  MESSAGE INPUT
// ────────────────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  resizeTextarea();
  setTypingSignal(true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => setTypingSignal(false), TYPING_TIMEOUT);
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

sendBtn.addEventListener('click', sendMessage);

function resizeTextarea() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
}

function scrollBottom() {
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ────────────────────────────────────────────────────────────
//  SAFE MODE
// ────────────────────────────────────────────────────────────
safeBtn.addEventListener('click', () => {
  if (safeTimer) {
    cancelSafeMode(); return;
  }
  activateSafeMode();
});

function activateSafeMode() {
  safeEnd = Date.now() + 5 * 60 * 1000;
  safeBar.classList.add('show');
  safeBtn.classList.add('active');
  showToast('Safe Mode ON — history deletes in 5 min');
  updateCountdown();
  safeInterval = setInterval(updateCountdown, 1000);
  safeTimer = setTimeout(nukeMessages, 5 * 60 * 1000);
}

function cancelSafeMode() {
  clearTimeout(safeTimer); clearInterval(safeInterval);
  safeTimer = safeInterval = safeEnd = null;
  safeBar.classList.remove('show');
  safeBtn.classList.remove('active');
  showToast('Safe Mode cancelled');
}

function updateCountdown() {
  const rem = Math.max(0, safeEnd - Date.now());
  const m = Math.floor(rem / 60000);
  const s = Math.floor((rem % 60000) / 1000);
  safeCountdown.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

async function nukeMessages() {
  clearInterval(safeInterval);
  safeTimer = safeInterval = safeEnd = null;
  safeBar.classList.remove('show');
  safeBtn.classList.remove('active');

  // Clear local
  localStorage.removeItem('sam_msgs');

  // Clear Firestore
  if (db) {
    try {
      const snap = await getDocs(collection(db, 'rooms', ROOM_ID, 'messages'));
      const batch = snap.docs.map(d => deleteDoc(d.ref));
      await Promise.all(batch);
    } catch(e) { console.error(e); }
  }

  messagesDiv.innerHTML = '';
  messagesDiv.appendChild(buildEmptyState());
  showToast('🔥 Chat history permanently deleted');
}

// ────────────────────────────────────────────────────────────
//  PRIVACY OVERLAY
// ────────────────────────────────────────────────────────────
privacyBtn.addEventListener('click', () => {
  privacyOverlay.classList.add('show');
  privacyBtn.classList.add('blurred-active');
});
privacyOverlay.addEventListener('click', () => {
  privacyOverlay.classList.remove('show');
  privacyBtn.classList.remove('blurred-active');
});

// Also support Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && privacyOverlay.classList.contains('show')) {
    privacyOverlay.classList.remove('show');
    privacyBtn.classList.remove('blurred-active');
  }
});

// ────────────────────────────────────────────────────────────
//  TOAST
// ────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
}

// ────────────────────────────────────────────────────────────
//  CLEANUP on tab close
// ────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  setTypingSignal(false);
  if (unsubMessages) unsubMessages();
});

</script>
</body>
</html>
